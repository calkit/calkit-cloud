name: Deploy to production

concurrency: production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Published release tag to deploy, e.g. v1.2.3. Use this to roll back by redeploying a previous release."
        required: true
        type: string

jobs:
  deploy:
    environment: production
    runs-on:
      - self-hosted
      - production
    env:
      ENVIRONMENT: production
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      DOMAIN: ${{ vars.DOMAIN }}
      BACKEND_CORS_ORIGINS: "https://${{ vars.DOMAIN }}"
      STACK_NAME: ${{ vars.STACK_NAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      FERNET_KEY: "${{ secrets.FERNET_KEY }}"
      FIRST_SUPERUSER: ${{ vars.FIRST_SUPERUSER }}
      FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
      FIRST_SUPERUSER_GITHUB_USERNAME: ${{ vars.FIRST_SUPERUSER_GITHUB_USERNAME }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAILS_FROM_EMAIL: ${{ vars.EMAILS_FROM_EMAIL }}
      POSTGRES_USER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: app
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      DOCKER_IMAGE_BACKEND: "backend-${{ vars.STACK_NAME }}"
      DOCKER_IMAGE_FRONTEND: "frontend-${{ vars.STACK_NAME }}"
      GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
      GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      ZENODO_CLIENT_ID: ${{ secrets.ZENODO_CLIENT_ID }}
      ZENODO_CLIENT_SECRET: ${{ secrets.ZENODO_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      ZOTERO_CLIENT_KEY: ${{ secrets.ZOTERO_CLIENT_KEY }}
      ZOTERO_CLIENT_SECRET: ${{ secrets.ZOTERO_CLIENT_SECRET }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
    steps:
      - name: Resolve and validate release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "Validating release tag: $TAG"
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$status" != "200" ]; then
            echo "::error::'$TAG' is not a published release (HTTP $status); only tagged releases can be deployed."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - run: docker compose -f docker-compose.yml --project-name ${{ vars.STACK_NAME }} build
      - run: docker compose -f docker-compose.yml --project-name ${{ vars.STACK_NAME }} up -d
