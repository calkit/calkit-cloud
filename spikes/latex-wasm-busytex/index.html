<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calkit · LaTeX WASM compile spike (busytex, TeX Live 2023)</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 10px 16px; border-bottom: 1px solid #8884; display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .note { font-size: 12px; opacity: .7; }
    #metrics { font-size: 13px; }
    button { font: inherit; padding: 6px 14px; cursor: pointer; }
    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    #pdf { width: 100%; height: 100%; border: 0; border-left: 1px solid #8884; background: #525659; }
    #log { margin: 0; padding: 10px 12px; overflow: auto; font: 12px/1.45 ui-monospace, monospace; white-space: pre-wrap; background: #1e1e1e; color: #d4d4d4; }
    #status { font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>LaTeX → PDF in WebAssembly</h1>
    <button id="run">Compile sample</button>
    <span id="status">idle</span>
    <span id="metrics"></span>
    <span class="note">busytex (MIT) · TeX Live 2023 · pdflatex · no server</span>
  </header>
  <main>
    <pre id="log">Click "Compile sample" to load the ~135&nbsp;MB engine + TeX Live basic bundle and compile sample/main.tex.
First run downloads the data bundle; subsequent runs hit the HTTP cache.
</pre>
    <iframe id="pdf" title="compiled PDF"></iframe>
  </main>
  <script src="main.js"></script>
</body>
</html>
